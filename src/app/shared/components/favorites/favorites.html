@if (favoriteService.isOpen()) {
  <div
    class="fixed right-0 top-0 z-50 h-screen w-96 bg-slate-900 shadow-2xl border-l border-slate-700"
  >
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-slate-700 p-4">
      <h2 class="text-xl font-bold text-white">⭐ Favoritos</h2>

      <button
        (click)="favoriteService.toggle()"
        class="rounded-lg p-2 text-slate-400 transition hover:bg-slate-800 hover:text-white"
      >
        ✕
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-slate-700 justify-evenly p-2">
      <button
        class="rounded-lg p-2 text-slate-400 transition bg-slate-700 hover:bg-slate-800 hover:text-yellow-400"
        (click)="selectedTab.set('teams')"
        [class.border-yellow-400]="selectedTab() === 'teams'"
        [class.text-yellow-400]="selectedTab() === 'teams'"
      >
        Equipos
      </button>

      <button
        class="rounded-lg p-2 text-slate-400 transition bg-slate-700 hover:bg-slate-800 hover:text-yellow-400"
        (click)="selectedTab.set('players')"
        [class.border-yellow-400]="selectedTab() === 'players'"
        [class.text-yellow-400]="selectedTab() === 'players'"
      >
        Jugadores
      </button>
    </div>
    @if (selectedTab() === 'teams') {
      <!-- Lista -->
      <div class="h-[calc(100vh-120px)] overflow-y-auto p-4">
        @for (team of favoriteService.favorites().teams; track team.idTeam) {
          <div
            class="mb-3 flex items-center gap-3 rounded-xl bg-slate-800 p-3 transition hover:bg-slate-700"
          >
            <img
              [src]="team.strBadge"
              [alt]="team.strTeam"
              class="h-12 w-12 rounded-lg bg-white object-contain p-1"
            />

            <div class="flex-1">
              <h3 class="font-semibold text-white">
                {{ team.strTeam }}
              </h3>
            </div>

            <button
              (click)="favoriteService.removeTeam(team.idTeam)"
              class="text-red-400 transition hover:text-red-500"
            >
              ✕
            </button>
          </div>
        }
      </div>
    } @else {
      <div class="h-[calc(100vh-120px)] overflow-y-auto p-4">
        @for (player of favoriteService.favorites().players; track player.idPlayer) {
          <div class="mb-3 flex items-center gap-3 rounded-xl bg-slate-800 p-3">
            <img [src]="player.strCutout" class="h-12 w-12 rounded-ñg object-cover" />
            <div class="flex-1">
              <span class="font-semibold text-white">
                {{ player.strPlayer }}
              </span>
            </div>
            <button
              (click)="favoriteService.removePlayer(player.idPlayer)"
              class="text-red-400 transition hover:text-red-500"
            >
              ✕
            </button>
          </div>
        }
      </div>
    }
  </div>
}
